<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Black timer (top) -->
    <div class="timer-bar" id="timer-black">
        <span class="timer-label">⬛ Black</span>
        <span class="timer-display" id="time-black">10:00</span>
    </div>

    <div class="container">
        <!-- board is generated by JS -->
        <div id="board"></div>

        <!-- promotion modal -->
        <div id="promo-overlay">
            <div id="promo-box">
                <p>Promote pawn to:</p>
                <div id="promo-choices"></div>
            </div>
        </div>
    </div>

    <!-- White timer (bottom) -->
    <div class="timer-bar" id="timer-white">
        <span class="timer-label">⬜ White</span>
        <span class="timer-display" id="time-white">10:00</span>
    </div>

    <!-- New Game button -->
    <button id="new-game-btn" onclick="initGame()">New Game</button>

    <!-- hidden elements required by JS -->
    <div id="status-bar" style="display:none">
        <span id="status-text">
            <span class="indicator" id="turn-dot"></span>
            <span id="status-msg">White's turn</span>
        </span>
        <button id="reset-btn" onclick="initGame()">New Game</button>
    </div>
    <div class="captures-row" id="black-captures" style="display:none"></div>
    <div class="captures-row" id="white-captures" style="display:none"></div>
    <div id="history-wrap" style="display:none"><div id="move-history"></div></div>
    <div id="rank-labels" style="display:none"></div>
    <div id="file-labels" style="display:none"></div>

    <script src="script.js"></script>
</body>
</html>
